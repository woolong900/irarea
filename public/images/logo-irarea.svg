<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100">
  <defs>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  
  <!-- IR text -->
  <text x="15" y="65" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#171717" letter-spacing="1">IR</text>
  
  <!-- Chip A - square chip with corner dots -->
  <g transform="translate(105, 18)">
    <!-- Main chip body -->
    <rect x="6" y="6" width="48" height="48" rx="6" fill="url(#chipGradient)"/>
    
    <!-- Corner pins -->
    <circle cx="3" cy="3" r="3" fill="#525252"/>
    <circle cx="57" cy="3" r="3" fill="#525252"/>
    <circle cx="3" cy="57" r="3" fill="#525252"/>
    <circle cx="57" cy="57" r="3" fill="#525252"/>
    
    <!-- Side pins -->
    <circle cx="22" cy="2" r="2.5" fill="#525252"/>
    <circle cx="38" cy="2" r="2.5" fill="#525252"/>
    <circle cx="22" cy="58" r="2.5" fill="#525252"/>
    <circle cx="38" cy="58" r="2.5" fill="#525252"/>
    <circle cx="2" cy="22" r="2.5" fill="#525252"/>
    <circle cx="2" cy="38" r="2.5" fill="#525252"/>
    <circle cx="58" cy="22" r="2.5" fill="#525252"/>
    <circle cx="58" cy="38" r="2.5" fill="#525252"/>
    
    <!-- Inner A letter -->
    <text x="30" y="42" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">A</text>
  </g>
  
  <!-- REA text -->
  <text x="170" y="65" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#171717" letter-spacing="1">REA</text>
</svg>
