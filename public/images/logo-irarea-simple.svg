<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 155 50">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  
  <!-- IR text -->
  <text x="5" y="35" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#171717" letter-spacing="0">IR</text>
  
  <!-- Chip A - square chip with corner dots -->
  <g transform="translate(48, 9)">
    <!-- Main chip body -->
    <rect x="4" y="4" width="24" height="24" rx="3" fill="url(#chipGrad)"/>
    
    <!-- Corner pins (like BGA/QFN package) -->
    <circle cx="2" cy="2" r="2" fill="#525252"/>
    <circle cx="30" cy="2" r="2" fill="#525252"/>
    <circle cx="2" cy="30" r="2" fill="#525252"/>
    <circle cx="30" cy="30" r="2" fill="#525252"/>
    
    <!-- Side pins -->
    <circle cx="16" cy="1" r="1.5" fill="#525252"/>
    <circle cx="16" cy="31" r="1.5" fill="#525252"/>
    <circle cx="1" cy="16" r="1.5" fill="#525252"/>
    <circle cx="31" cy="16" r="1.5" fill="#525252"/>
    
    <!-- Inner A letter -->
    <text x="16" y="22" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">A</text>
  </g>
  
  <!-- REA text -->
  <text x="84" y="35" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#171717" letter-spacing="0">REA</text>
</svg>
